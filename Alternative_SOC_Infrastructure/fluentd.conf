<source>
  @type tail
  path /logs/nginx/access.log
  pos_file /var/log/td-agent/nginx-access.pos
  tag nginx.access
  <parse>
    @type nginx
  </parse>
</source>

<source>
  @type tail
  path /logs/firewall/iptables.log
  pos_file /var/log/td-agent/firewall.pos
  tag firewall.iptables
  <parse>
    @type none
  </parse>
</source>

<filter **>
  @type record_transformer
  <record>
    infrastructure_name "docker-lab"
  </record>
</filter>

# Output vers votre SOC
<match **>
  @type file
  path /logs/fluentd/output
  <format>
    @type json
  </format>
</match>
